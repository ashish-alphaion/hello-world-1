<!-- ═══════════════════════════════════════════════════════
     ONE SCRIPT — Firebase SDK + all UI logic combined.
     Using type="module" is required for Firebase imports.
     All event listeners are attached with addEventListener
     so they work correctly inside module scope.
═══════════════════════════════════════════════════════ -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getAuth,
    signInWithEmailAndPassword,
    createUserWithEmailAndPassword,
    updateProfile,
    sendPasswordResetEmail,
    GoogleAuthProvider,
    signInWithPopup,
    setPersistence,
    browserLocalPersistence,
    browserSessionPersistence,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  /* ── Firebase init ── */
  const app  = initializeApp({
    apiKey:            "AIzaSyAmiRbKhh6H7KSu7pNG2vwPqRAvOtIhIBA",
    authDomain:        "helloworld-3a625.firebaseapp.com",
    projectId:         "helloworld-3a625",
    storageBucket:     "helloworld-3a625.firebasestorage.app",
    messagingSenderId: "300395033324",
    appId:             "1:300395033324:web:a7d2fac08f9488d4476bc9",
    measurementId:     "G-CGDESZ1KJR"
  });
  const auth           = getAuth(app);
  const googleProvider = new GoogleAuthProvider();

  /* ════════════════════════════════
     UTILITY FUNCTIONS
  ════════════════════════════════ */
  function showToast(msg, icon = 'check_circle', color = '#22c55e') {
    document.getElementById('toast-msg').textContent  = msg;
    document.getElementById('toast-icon').textContent = icon;
    document.getElementById('toast-icon').style.color = color;
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3500);
  }

  function friendlyError(code) {
    const map = {
      'auth/user-not-found':         'No account found with that email.',
      'auth/wrong-password':         'Incorrect password. Please try again.',
      'auth/invalid-credential':     'Invalid email or password.',
      'auth/email-already-in-use':   'An account with this email already exists.',
      'auth/weak-password':          'Password must be at least 6 characters.',
      'auth/invalid-email':          'Please enter a valid email address.',
      'auth/too-many-requests':      'Too many attempts. Please try again later.',
      'auth/network-request-failed': 'Network error. Check your connection.',
      'auth/popup-closed-by-user':   'Sign-in popup was closed.',
    };
    if (!map[code]) console.error('Firebase error code:', code);
    return map[code] || `Auth error: ${code || 'unknown'}. See browser console.`;
  }

  function setLoading(btnId, textId, arrowId, loading, label) {
    const btn   = document.getElementById(btnId);
    const text  = document.getElementById(textId);
    const arrow = arrowId ? document.getElementById(arrowId) : null;
    btn.disabled      = loading;
    btn.style.opacity = loading ? '0.75' : '';
    text.innerHTML    = loading ? '<span class="spinner"></span>' : label;
    if (arrow) arrow.style.display = loading ? 'none' : '';
  }

  function togglePw(inputId, btn) {
    const input = document.getElementById(inputId);
    const icon  = btn.querySelector('.material-symbols-outlined');
    const isHidden = input.type === 'password';
    input.type       = isHidden ? 'text' : 'password';
    icon.textContent = isHidden ? 'visibility' : 'visibility_off';
  }

  function checkStrength(val) {
    const bar   = document.getElementById('strength-bar');
    const label = document.getElementById('strength-label');
    let score = 0;
    if (val.length >= 8)           score++;
    if (/[A-Z]/.test(val))         score++;
    if (/[0-9]/.test(val))         score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;
    const levels = [
      { w: '0%',   c: 'transparent', t: ''         },
      { w: '25%',  c: '#ba1a1a',     t: 'Weak'     },
      { w: '50%',  c: '#f59e0b',     t: 'Fair'     },
      { w: '75%',  c: '#3b82f6',     t: 'Good'     },
      { w: '100%', c: '#22c55e',     t: 'Strong ✓' },
    ];
    const lvl = val.length === 0 ? levels[0] : levels[score];
    bar.style.width           = lvl.w;
    bar.style.backgroundColor = lvl.c;
    label.textContent         = lvl.t;
    label.style.color         = lvl.c;
  }

  /* ════════════════════════════════
     TAB SWITCHING
  ════════════════════════════════ */
  function switchTab(tab) {
    const isLogin = tab === 'login';
    document.getElementById('panel-login').className    = `panel ${isLogin  ? 'panel-visible' : 'panel-hidden'}`;
    document.getElementById('panel-register').className = `panel ${!isLogin ? 'panel-visible' : 'panel-hidden'}`;
    document.getElementById('tab-login').className      = `${isLogin  ? 'tab-active' : 'tab-inactive'} flex-1 py-4 text-sm font-headline tracking-wide transition-colors relative`;
    document.getElementById('tab-register').className   = `${!isLogin ? 'tab-active' : 'tab-inactive'} flex-1 py-4 text-sm font-headline tracking-wide transition-colors relative`;
    document.getElementById('underline-login').style.opacity    = isLogin  ? '1' : '0';
    document.getElementById('underline-register').style.opacity = !isLogin ? '1' : '0';
    document.getElementById('page-title').textContent    = isLogin ? 'Welcome Back' : 'Create Account';
    document.getElementById('page-subtitle').textContent = isLogin ? 'Log in to access your dashboard.' : 'Join Slate & Cipher today.';
  }

  /* ════════════════════════════════
     MODAL HELPERS
  ════════════════════════════════ */
  function openModal()  {
    const m = document.getElementById('modal-forgot');
    m.classList.remove('hidden');
    m.classList.add('flex');
  }
  function closeModal() {
    const m = document.getElementById('modal-forgot');
    m.classList.add('hidden');
    m.classList.remove('flex');
  }

  /* ════════════════════════════════
     AUTH STATE OBSERVER
  ════════════════════════════════ */
  onAuthStateChanged(auth, (user) => {
    if (user) {
      console.log('Logged in:', user.email);
      // ✅ Redirect to your dashboard — uncomment the line below:
      window.location.href = "home.html";
    }
  });

  /* ════════════════════════════════
     WIRE UP ALL EVENT LISTENERS
     (must use addEventListener here
      since we're inside a module)
  ════════════════════════════════ */

  // Tabs
  document.getElementById('tab-login').addEventListener('click',    () => switchTab('login'));
  document.getElementById('tab-register').addEventListener('click', () => switchTab('register'));

  // Password visibility toggles
  document.getElementById('toggle-login-pw').addEventListener('click',    function() { togglePw('login-password', this); });
  document.getElementById('toggle-reg-pw').addEventListener('click',      function() { togglePw('reg-password', this); });
  document.getElementById('toggle-reg-confirm').addEventListener('click', function() { togglePw('reg-confirm', this); });

  // Live password strength meter
  document.getElementById('reg-password').addEventListener('input', (e) => checkStrength(e.target.value));

  // Forgot password modal
  document.getElementById('btn-forgot-open').addEventListener('click',   openModal);
  document.getElementById('btn-forgot-cancel').addEventListener('click', closeModal);
  document.getElementById('modal-backdrop').addEventListener('click',    closeModal);

  // SSO buttons
  document.getElementById('btn-google').addEventListener('click', async () => {
    try {
      await signInWithPopup(auth, googleProvider);
      showToast('Signed in with Google!', 'check_circle', '#22c55e');
    } catch (err) {
      showToast(friendlyError(err.code), 'error', '#ba1a1a');
    }
  });
  document.getElementById('btn-sso').addEventListener('click', () => {
    showToast('SSO is not configured yet.', 'info', '#3b82f6');
  });

  // Send password reset email
  document.getElementById('btn-forgot-send').addEventListener('click', async () => {
    const email = document.getElementById('forgot-email').value.trim();
    if (!email) { showToast('Please enter your email.', 'error', '#ba1a1a'); return; }
    const btnText = document.getElementById('forgot-btn-text');
    btnText.textContent = 'Sending…';
    try {
      await sendPasswordResetEmail(auth, email);
      showToast('Reset link sent! Check your inbox.', 'check_circle', '#22c55e');
      document.getElementById('forgot-email').value = '';
      closeModal();
    } catch (err) {
      showToast(friendlyError(err.code), 'error', '#ba1a1a');
    } finally {
      btnText.textContent = 'Send Link';
    }
  });

  /* ── LOGIN ── */
  document.getElementById('form-login').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const remember = document.getElementById('remember-me').checked;

    setLoading('btn-login', 'btn-login-text', 'btn-login-arrow', true, 'Sign In');
    try {
      await setPersistence(auth, remember ? browserLocalPersistence : browserSessionPersistence);
      await signInWithEmailAndPassword(auth, email, password);
      showToast('Signed in successfully!', 'check_circle', '#22c55e');
    } catch (err) {
      showToast(friendlyError(err.code), 'error', '#ba1a1a');
    } finally {
      setLoading('btn-login', 'btn-login-text', 'btn-login-arrow', false, 'Sign In');
    }
  });

  /* ── REGISTER ── */
  document.getElementById('form-register').addEventListener('submit', async (e) => {
    e.preventDefault();
    const first    = document.getElementById('reg-firstname').value.trim();
    const last     = document.getElementById('reg-lastname').value.trim();
    const email    = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    const confirm  = document.getElementById('reg-confirm').value;
    const agreed   = document.getElementById('agree-terms').checked;

    if (!agreed) {
      showToast('Please accept the Terms of Service.', 'error', '#ba1a1a');
      return;
    }
    if (password !== confirm) {
      showToast("Passwords don't match.", 'error', '#ba1a1a');
      return;
    }
    if (password.length < 8) {
      showToast('Password must be at least 8 characters.', 'error', '#ba1a1a');
      return;
    }

    setLoading('btn-register', 'btn-register-text', 'btn-register-arrow', true, 'Create Account');
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      await updateProfile(cred.user, { displayName: `${first} ${last}` });
      showToast(`Account created! Welcome, ${first}!`, 'check_circle', '#22c55e');
      document.getElementById('form-register').reset();
      checkStrength('');
      setTimeout(() => switchTab('login'), 1800);
    } catch (err) {
      showToast(friendlyError(err.code), 'error', '#ba1a1a');
    } finally {
      setLoading('btn-register', 'btn-register-text', 'btn-register-arrow', false, 'Create Account');
    }
  });

</script>
</body>
</html>
